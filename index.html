<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Social Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
            position: relative;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 25px;
            border: 5px solid #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .profile-pic:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 2.2em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            font-weight: 300;
            margin-bottom: 35px;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 18px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 500;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .social-btn:hover::before {
            left: 100%;
        }

        .social-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.6);
        }

        .social-btn i {
            font-size: 1.4em;
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn.whatsapp { background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); }
        .social-btn.instagram { background: linear-gradient(135deg, #E4405F 0%, #F77737 100%); }
        .social-btn.facebook { background: linear-gradient(135deg, #1877F2 0%, #0E5A8A 100%); }
        .social-btn.twitter { background: linear-gradient(135deg, #1DA1F2 0%, #0D8BD9 100%); }
        .social-btn.youtube { background: linear-gradient(135deg, #FF0000 0%, #CC0000 100%); }
        .social-btn.linkedin { background: linear-gradient(135deg, #0077B5 0%, #005885 100%); }
        .social-btn.telegram { background: linear-gradient(135deg, #0088cc 0%, #0088cc 100%); }

        .footer {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid #eee;
            color: #888;
            font-size: 0.9em;
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 25px;
                margin: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .social-btn {
                padding: 15px 20px;
                font-size: 1em;
            }
        }

        /* Floating particles effect */
        .particle {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            pointer-events: none;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- Floating particles -->
    <div class="particle" style="left: 10%; width: 10px; height: 10px; animation-delay: 0s;"></div>
    <div class="particle" style="left: 20%; width: 15px; height: 15px; animation-delay: 1s;"></div>
    <div class="particle" style="left: 80%; width: 8px; height: 8px; animation-delay: 2s;"></div>
    <div class="particle" style="left: 90%; width: 12px; height: 12px; animation-delay: 3s;"></div>

    <div class="container">
        <!-- EDIT YOUR PHOTO HERE -->
        <img src="https://i.postimg.cc/d1cxfpH7/See-more-TRANDING.webp" alt="Profile" class="profile-pic">
        
        <!-- EDIT YOUR NAME HERE -->
        <h1>ARSHAD HUSSAIN</h1>
        
        <!-- EDIT YOUR TITLE HERE -->
        <p class="subtitle">Connect with me on social media 🚀</p>

        <div class="social-links">
            <!-- EDIT LINKS HERE - Bas link change kar do -->
            <a href="https://wa.me/9368775500" class="social-btn whatsapp" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>
            
            <a href="https://www.instagram.com/itsarshad001?igsh=MThyZXpuYnFmdDZodA==" class="social-btn instagram" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            
            <a href="https://www.facebook.com/share/1AvsA8P8x5/" class="social-btn facebook" target="_blank">
                <i class="fab fa-facebook-f"></i>
                <span>Facebook</span>
            </a>
            
            <a href="https://x.com/ArshadHuss47921" class="social-btn twitter" target="_blank">
                <i class="fab fa-twitter"></i>
                <span>Twitter</span>
            </a>
            
            <a href="https://www.youtube.com/channel/UCcdI79oXNdfhiNZoFJlP8Cg" class="social-btn youtube" target="_blank">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </a>
            
          
            
            <a href="t.me/Itsarshad_001" class="social-btn telegram" target="_blank">
                <i class="fab fa-telegram-plane"></i>
                <span>Telegram</span>
            </a>
        </div>

        <div class="footer">
            <p>Made with ❤️ | Share karo!</p>
        </div>
    </div>

    <script>
        // Smooth scroll effect
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        // Add click animation
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });
    </script>
</body>
</html>
